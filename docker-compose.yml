services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: game_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      # חשוב: כאן אנחנו משתמשים בשם השירות (db) ולא ב-localhost
      DATABASE_URL: "postgresql://postgres:password@db:5432/game_db"
    command: sh -c "npx prisma migrate deploy && node main.js"